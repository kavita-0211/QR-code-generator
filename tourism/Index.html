<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ttavel World with Us</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
  </head>
  <body>
    <!-- Header start -->
    <header>
      <div class="container">
        <nav>
          <div class="logo"><span>T</span>ravel</div>
          <ul class="nav-list">
            <div class="btn">
              <i class="fa-solid fa-xmark close-btn"></i>
            </div>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Tours</a></li>
            <li><a href="#">Destination</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
          <div class="btn">
            <i class="fa-solid fa-bars menu-btn"></i>
          </div>
        </nav>
      </div>
    </header>
    <!-- Header Close -->

    <!-- Showcase Start -->
    <main>
      <div class="slider-container swiper">
        <div class="slide-content swiper-wrapper">
          <div class="overlay swiper-slide">
            <img src="image/Home1.jpg" alt="" />
            <div class="img-overlay">
              <p>Let's Travel the World with us</p>
              <h2><span>Discover</span> The World</h2>
              <h2>With Our Guide</h2>
            </div>
          </div>
          <div class="overlay swiper-slide">
            <img src="image/Home2.webp" alt="" />
            <div class="img-overlay">
              <p>Let's Travel the World with us</p>
              <h2><span>Discover</span> The World</h2>
              <h2>With Our Guide</h2>
            </div>
          </div>
          <div class="overlay swiper-slide">
            <img src="image/home3.jpg" alt="" />
            <div class="img-overlay">
              <p>Let's Travel the World with us</p>
              <h2><span>Discover</span> The World</h2>
              <h2>With Our Guide</h2>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- Showcase Close -->

    <!-- Search Location Start -->
    <section id="Location-search">
      <div class="container">
        <div class="form-wrapper">
          <form action="#">
            <input type="text" placeholder="Where to?" class="from-control" />
            <select class="form-control">
              <option value="destination">Destination</option>
              <option value="maldives">Maldives</option>
              <option value="London">London</option>
              <option value="Paris">Paris</option>
            </select>
            <select class="form-control">
              <option value="duration">Duration</option>
              <option value="1 day">1-day Tour</option>
              <option value="2-4 day">2-4 day Tour</option>
              <option value="5-7 day">5-7 day Tour</option>
              <option value="7+ day">7+ day Tour</option>
            </select>
            <button type="button" class="primary-btn">Search Now</button>
          </form>
        </div>
      </div>
    </section>
    <!-- Search Location Close -->

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/swiper.js"></script>
  </body>
</html>
